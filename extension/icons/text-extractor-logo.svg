<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <clipPath id="roundedClip">
      <rect width="128" height="128" rx="24"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Document shape -->
  <rect x="22" y="18" width="64" height="80" rx="6" fill="#1E3A5F" stroke="#2563EB" stroke-width="1.5"/>

  <!-- Folded corner -->
  <path d="M70 18 L86 34 L70 34 Z" fill="#0F172A"/>
  <path d="M70 18 L86 34" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Text lines on document -->
  <rect x="30" y="42" width="38" height="4" rx="2" fill="#38BDF8" opacity="0.9"/>
  <rect x="30" y="52" width="44" height="4" rx="2" fill="#94A3B8" opacity="0.6"/>
  <rect x="30" y="62" width="32" height="4" rx="2" fill="#94A3B8" opacity="0.6"/>
  <rect x="30" y="72" width="40" height="4" rx="2" fill="#94A3B8" opacity="0.6"/>
  <rect x="30" y="82" width="28" height="4" rx="2" fill="#94A3B8" opacity="0.4"/>

  <!-- Cursor / extraction arrow -->
  <g transform="translate(72, 70)">
    <!-- Glowing circle behind cursor -->
    <circle cx="18" cy="18" r="20" fill="#38BDF8" opacity="0.12"/>
    <circle cx="18" cy="18" r="14" fill="#0F172A" stroke="url(#accent)" stroke-width="2"/>
    <!-- Arrow pointing into document -->
    <path d="M22 18 L14 18 M17 14 L13 18 L17 22" stroke="url(#accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Small spark dots -->
    <circle cx="26" cy="10" r="1.5" fill="#38BDF8" opacity="0.8"/>
    <circle cx="30" cy="18" r="1" fill="#818CF8" opacity="0.7"/>
    <circle cx="26" cy="26" r="1.5" fill="#38BDF8" opacity="0.6"/>
  </g>
</svg>
