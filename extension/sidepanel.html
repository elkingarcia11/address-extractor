<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Extractor</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 14px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #f8f9fa;
    }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .header img { width: 36px; height: 36px; flex-shrink: 0; }
    h1 { margin: 0; font-size: 17px; font-weight: 600; }
    .hint {
      margin: 0 0 12px;
      color: #555;
      font-size: 12px;
      line-height: 1.4;
    }
    .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .btn-row button { flex: 1; padding: 10px 16px; font-size: 14px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; }
    #startExtraction { color: #fff; background: #2563eb; }
    #startExtraction:hover:not(:disabled) { background: #1d4ed8; }
    #startExtraction:disabled { background: #9ca3af; color: #fff; cursor: not-allowed; opacity: 1; }
    #startExtraction:disabled:hover { background: #9ca3af; }
    #stopExtraction { color: #fff; background: #dc2626; }
    #stopExtraction:hover:not(:disabled) { background: #b91c1c; }
    #stopExtraction:disabled { background: #9ca3af; color: #fff; cursor: not-allowed; opacity: 1; }
    #stopExtraction:disabled:hover { background: #9ca3af; }
    label { font-weight: 500; color: #333; display: block; margin-bottom: 4px; }
    #output {
      width: 100%;
      min-height: 280px;
      padding: 10px 12px;
      font-family: ui-monospace, monospace;
      font-size: 13px;
      line-height: 1.5;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: vertical;
      background: #fff;
    }
    .export-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .export-row button {
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
    }
    .export-row button:hover { background: #f3f4f6; border-color: #9ca3af; }
    .export-row button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { margin-top: 8px; font-size: 12px; color: #666; }
    .donate { margin-top: 16px; padding-top: 12px; border-top: 1px solid #e5e7eb; text-align: center; }
    .donate .donate-tip { font-size: 12px; color: #6b7280; margin: 0 0 10px 0; }
    .donate .donate-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600;
      color: #fff; background: #635bff; border: none; border-radius: 8px;
      cursor: pointer; text-decoration: none; transition: background 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 1px 2px rgba(99, 91, 255, 0.25);
    }
    .donate .donate-btn:hover { background: #5046e5; box-shadow: 0 2px 4px rgba(99, 91, 255, 0.35); }
    .donate .donate-btn:active { background: #4439c9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img id="headerLogo" alt="" width="36" height="36" />
      <h1>Text Extractor</h1>
    </div>
    <p class="hint">Click <strong>Start extraction</strong>, then click any element in <strong>any tab</strong> in this window (or use arrow keys). No limit, each capture is added on a new line. Click <strong>Stop extraction</strong> when done.</p>
    <div class="btn-row">
      <button id="startExtraction" type="button">Start extraction</button>
      <button id="stopExtraction" type="button" disabled>Stop extraction</button>
    </div>
    <label for="output">Extracted text (one per line):</label>
    <textarea id="output" placeholder="Start extracting, then click elements on the page…"></textarea>
    <div class="export-row">
      <button type="button" id="exportTxt">Export TXT</button>
      <button type="button" id="exportCsv">Export CSV</button>
      <button type="button" id="exportXlsx">Export XLSX</button>
    </div>
    <p id="status" class="status" aria-live="polite"></p>
    <div class="donate">
      <p class="donate-tip">If you find this app helpful, consider a donation.</p>
      <a class="donate-btn" href="https://buy.stripe.com/fZu9ATdT85in2PCgDAaVa00" target="_blank" rel="noopener noreferrer">Donate with Stripe</a>
    </div>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
